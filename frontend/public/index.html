<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#FF4D00" />

    <!-- Primary SEO -->
    <title>Your Name — Full Stack Developer</title>
    <meta name="description" content="Full Stack Developer specializing in React, Node.js, and modern web technologies. View my projects and get in touch." />
    <meta name="keywords" content="full stack developer, react developer, nodejs, portfolio, web developer" />
    <meta name="author" content="Your Name" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://yourportfolio.com" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Your Name — Full Stack Developer" />
    <meta property="og:description" content="Full Stack Developer specializing in React, Node.js, and modern web technologies." />
    <meta property="og:url" content="https://yourportfolio.com" />
    <meta property="og:image" content="https://yourportfolio.com/og-image.png" />
    <meta property="og:site_name" content="devfolio" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Your Name — Full Stack Developer" />
    <meta name="twitter:description" content="Full Stack Developer specializing in React, Node.js, and modern web technologies." />
    <meta name="twitter:image" content="https://yourportfolio.com/og-image.png" />
    <meta name="twitter:creator" content="@yourhandle" />

    <!-- PWA -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <!-- Preconnect fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Your Name",
        "url": "https://yourportfolio.com",
        "jobTitle": "Full Stack Developer",
        "sameAs": [
          "https://github.com/yourusername",
          "https://linkedin.com/in/yourprofile",
          "https://twitter.com/yourhandle"
        ]
      }
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
